<style>
/* ═══════════════════════════════════════════════════════════
   EMERALD THEME — CSS Variables & Base
═══════════════════════════════════════════════════════════ */
:root {
  --em-50:  #ecfdf5;
  --em-100: #d1fae5;
  --em-200: #a7f3d0;
  --em-400: #34d399;
  --em-500: #10b981;
  --em-600: #059669;
  --em-700: #047857;
  --em-800: #065f46;
  --em-900: #064e3b;
  --sidebar-w: 262px;
  --topbar-h: 60px;
  --radius-card: 14px;
  --shadow-card: 0 2px 12px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
}

* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0fdf4;
  color: #1e293b;
  min-height: 100vh;
}

/* ── EMERALD UTILITIES ───────────────────────────────────── */
.text-emerald  { color: var(--em-600) !important; }
.bg-em-50      { background: var(--em-50); }
.border-em     { border-color: var(--em-200) !important; }

.btn-emerald {
  background: linear-gradient(135deg, var(--em-700) 0%, var(--em-500) 100%);
  border: none;
  color: #fff;
  font-weight: 600;
  letter-spacing: .2px;
  transition: all .2s ease;
  box-shadow: 0 2px 10px rgba(5,150,105,.35);
}
.btn-emerald:hover, .btn-emerald:focus {
  background: linear-gradient(135deg, var(--em-800) 0%, var(--em-600) 100%);
  color: #fff;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(5,150,105,.45);
}
.btn-emerald:active { transform: translateY(0); }

.form-control:focus,
.form-select:focus {
  border-color: var(--em-400);
  box-shadow: 0 0 0 .2rem rgba(16,185,129,.18);
}

/* ── LOGIN PAGE ──────────────────────────────────────────── */
.login-bg {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--em-900) 0%, var(--em-700) 55%, var(--em-500) 100%);
  position: relative;
  overflow: hidden;
}

.login-bg::before, .login-bg::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
}
.login-bg::before { width: 550px; height: 550px; top: -180px; right: -180px; }
.login-bg::after  { width: 380px; height: 380px; bottom: -140px; left: -140px; }

.login-card {
  background: #fff;
  border-radius: 20px;
  width: 100%;
  max-width: 430px;
  margin: 1rem;
  overflow: hidden;
  position: relative;
  z-index: 1;
  box-shadow: 0 30px 70px rgba(0,0,0,.3);
  animation: slideUp .4s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-header {
  background: linear-gradient(135deg, var(--em-900) 0%, var(--em-700) 100%);
  color: #fff;
  text-align: center;
  padding: 2.5rem 2rem 2rem;
}

.login-logo {
  width: 72px; height: 72px;
  background: rgba(255,255,255,.15);
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.1rem;
  margin: 0 auto 1rem;
  backdrop-filter: blur(8px);
}

.login-body   { padding: 2rem; }
.login-footer { padding: .875rem 2rem; text-align: center; background: #f8fafc; border-top: 1px solid #f1f5f9; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: linear-gradient(175deg, var(--em-900) 0%, var(--em-800) 55%, var(--em-700) 100%);
  display: flex;
  flex-direction: column;
  z-index: 1050;
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 4px 0 28px rgba(0,0,0,.15);
}

.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(3px);
  z-index: 1040;
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s, visibility .3s;
}
.sidebar-overlay.show { opacity: 1; visibility: visible; }

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 1.375rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.1);
  flex-shrink: 0;
}

.brand-icon {
  width: 42px; height: 42px;
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem;
  color: #fff;
  flex-shrink: 0;
}

.brand-title    { font-size: .92rem; font-weight: 700; color: #fff; letter-spacing: .3px; }
.brand-subtitle { font-size: .68rem; color: rgba(255,255,255,.5); margin-top: 1px; }

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: .625rem .875rem;
  padding: .75rem;
  background: rgba(255,255,255,.08);
  border-radius: 12px;
  flex-shrink: 0;
}

.user-avatar {
  width: 38px; height: 38px;
  background: var(--em-500);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  color: #fff;
  font-size: 1rem;
  flex-shrink: 0;
}

.user-name  { font-weight: 600; color: #fff; font-size: .83rem; line-height: 1.3; }
.user-role  { font-size: .68rem; color: var(--em-200); margin-top: 1px; }

.sidebar-divider { height: 1px; background: rgba(255,255,255,.08); margin: .25rem 1.25rem; flex-shrink: 0; }

.sidebar-nav {
  list-style: none;
  padding: .375rem .75rem;
  margin: 0;
  flex: 1;
}

.nav-item-label {
  font-size: .63rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,.35);
  padding: .75rem .5rem .3rem;
}

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: .6rem .875rem;
  color: rgba(255,255,255,.72);
  text-decoration: none;
  border-radius: 10px;
  font-size: .855rem;
  font-weight: 500;
  transition: all .16s ease;
  margin-bottom: 1px;
  position: relative;
}

.sidebar-link i { font-size: 1.05rem; flex-shrink: 0; }

.sidebar-link:hover {
  background: rgba(255,255,255,.11);
  color: #fff;
  transform: translateX(2px);
}

.sidebar-link.active {
  background: rgba(255,255,255,.17);
  color: #fff;
  font-weight: 600;
}

.sidebar-link.active::before {
  content: '';
  position: absolute;
  left: -3px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 62%;
  background: var(--em-400);
  border-radius: 0 4px 4px 0;
}

.sidebar-bottom {
  padding: .75rem;
  border-top: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0;
}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  height: var(--topbar-h);
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: .875rem;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,.06);
}

.btn-sidebar-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  font-size: 1.4rem;
  color: var(--em-700);
  padding: .25rem .5rem;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  flex-shrink: 0;
}
.btn-sidebar-toggle:hover { background: var(--em-50); }

.topbar-title {
  font-weight: 700;
  color: var(--em-900);
  font-size: .92rem;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }

.live-clock {
  font-size: .95rem;
  font-weight: 700;
  color: var(--em-700);
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}

.topbar-date { font-size: .67rem; color: #94a3b8; }

/* ── MAIN CONTENT ─────────────────────────────────────────── */
#main-content {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.views-container { padding: 1.5rem; flex: 1; }

/* ── VIEWS ───────────────────────────────────────────────── */
.view { display: none; animation: fadeIn .25s ease; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.view-header   { margin-bottom: 1.375rem; }
.view-title    { font-size: 1.1rem; font-weight: 700; color: var(--em-900); margin-bottom: .2rem; }
.view-subtitle { color: #64748b; font-size: .855rem; margin: 0; }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  border: none;
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.card-header-emerald {
  background: linear-gradient(135deg, var(--em-800) 0%, var(--em-600) 100%);
  color: #fff;
  padding: .875rem 1.25rem;
  font-weight: 600;
  font-size: .855rem;
}

/* ── ABSENSI DISPLAY ─────────────────────────────────────── */
.absen-icon-wrap {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.9rem;
  margin: 0 auto .875rem;
}

.absen-time { font-size: .82rem; color: #64748b; margin-top: .375rem; }
.absen-time strong { color: var(--em-700); }

/* ── STAT ITEMS (Dashboard) ──────────────────────────────── */
.stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .6rem 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: .855rem;
}
.stat-label { color: #64748b; }
.stat-value { font-weight: 700; color: var(--em-700); }

/* ── STAT CARDS (Owner) ──────────────────────────────────── */
.stat-card { border-radius: var(--radius-card) !important; }
.stat-card-number { font-size: 2.25rem; font-weight: 800; line-height: 1; margin-bottom: .2rem; }
.stat-card-label  { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; opacity: .8; }

.stat-hadir { background: linear-gradient(135deg, #bbf7d0, #d1fae5); }
.stat-hadir .stat-card-number { color: var(--em-800); }
.stat-hadir .stat-card-label  { color: var(--em-900); }

.stat-wfh { background: linear-gradient(135deg, #bfdbfe, #dbeafe); }
.stat-wfh .stat-card-number { color: #1d4ed8; }
.stat-wfh .stat-card-label  { color: #1e3a8a; }

.stat-izin { background: linear-gradient(135deg, #fde68a, #fef3c7); }
.stat-izin .stat-card-number { color: #b45309; }
.stat-izin .stat-card-label  { color: #78350f; }

.stat-sakit { background: linear-gradient(135deg, #fecaca, #fee2e2); }
.stat-sakit .stat-card-number { color: #b91c1c; }
.stat-sakit .stat-card-label  { color: #7f1d1d; }

/* ── TABLES ──────────────────────────────────────────────── */
.table { font-size: .815rem; margin: 0; }

.table thead th {
  background: var(--em-50);
  color: var(--em-800);
  font-weight: 700;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 2px solid var(--em-200);
  padding: .75rem 1rem;
  white-space: nowrap;
}

.table tbody tr { transition: background .1s; }
.table tbody tr:hover { background: var(--em-50); }
.table tbody td { padding: .6rem 1rem; vertical-align: middle; border-color: #f1f5f9; }

/* ── BADGES ──────────────────────────────────────────────── */
.badge {
  font-size: .69rem;
  font-weight: 600;
  padding: .28em .65em;
  border-radius: 6px;
  border: 1px solid transparent;
}

.badge-hadir, .badge-wfo { background: var(--em-100); color: var(--em-800); border-color: var(--em-200); }
.badge-wfh   { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
.badge-izin  { background: #fef9c3; color: #92400e; border-color: #fde68a; }
.badge-sakit { background: #fee2e2; color: #991b1b; border-color: #fecaca; }

.badge-selesai  { background: var(--em-100); color: var(--em-800); border-color: var(--em-200); }
.badge-berjalan { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
.badge-tertunda { background: #fef3c7; color: #92400e; border-color: #fde68a; }

/* ── RECENT TASK (Dashboard) ─────────────────────────────── */
.recent-task-row {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .7rem 1rem;
  border-bottom: 1px solid #f1f5f9;
  font-size: .845rem;
  transition: background .1s;
}
.recent-task-row:last-child { border-bottom: none; }
.recent-task-row:hover { background: var(--em-50); }

.task-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-selesai  { background: var(--em-500); }
.dot-berjalan { background: #3b82f6; }
.dot-tertunda { background: #f59e0b; }

/* ── ROLE BADGES ─────────────────────────────────────────── */
.role-badge-owner { background:#fdf4ff; color:#7e22ce; border:1px solid #e9d5ff; }
.role-badge-admin { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
.role-badge-user  { background:var(--em-50); color:var(--em-800); border:1px solid var(--em-200); }

/* Role label di sidebar */
.user-role        { font-size:.68rem; color:var(--em-200); margin-top:1px; }
.role-owner       { color:#d8b4fe !important; }
.role-admin       { color:#93c5fd !important; }
.role-user        { color:var(--em-200) !important; }

/* ── FORM SECTION LABEL ──────────────────────────────────── */
.form-section-label {
  font-size:.75rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.5px;
  color:var(--em-700);
  padding:.25rem .5rem;
  background:var(--em-50);
  border-radius:6px;
  border-left:3px solid var(--em-500);
}

/* ── LOKASI LINK ─────────────────────────────────────────── */
.lokasi-link {
  font-size: .78rem;
  font-weight: 600;
  color: var(--em-600);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: .2em .55em;
  background: var(--em-50);
  border: 1px solid var(--em-200);
  border-radius: 6px;
  transition: background .15s, color .15s;
}
.lokasi-link:hover {
  background: var(--em-100);
  color: var(--em-800);
}

/* ── PASSWORD STRENGTH ───────────────────────────────────── */
.progress { border-radius:10px; background:#f1f5f9; }
.progress-bar { border-radius:10px; transition: width .3s ease, background .3s ease; }

/* ── KATEGORI LIST ───────────────────────────────────────── */
.kategori-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .6rem .875rem;
  background: var(--em-50);
  border: 1px solid var(--em-100);
  border-radius: 9px;
  margin-bottom: .5rem;
  font-size: .855rem;
  transition: background .1s;
}
.kategori-item:hover { background: var(--em-100); }

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: #94a3b8;
}
.empty-state i    { font-size: 3rem; display: block; margin-bottom: .75rem; opacity: .35; }
.empty-state p    { font-size: .875rem; margin: 0; }

/* ── MODAL ───────────────────────────────────────────────── */
.btn-kehadiran {
  padding: .75rem 1rem;
  font-weight: 600;
  font-size: .875rem;
  border-radius: 10px;
  text-align: left;
}

/* ── PUBLIC STATISTIK PAGE ───────────────────────────────── */
.statistik-public-bg {
  background: linear-gradient(160deg, var(--em-900) 0%, var(--em-800) 40%, var(--em-700) 100%);
}

.statistik-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem;
  background: rgba(0,0,0,.15);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,.1);
}

.pub-stat-card {
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 16px;
  padding: 1.5rem 1rem;
  text-align: center;
  color: #fff;
  transition: transform .2s, background .2s;
}
.pub-stat-card:hover { background: rgba(255,255,255,.18); transform: translateY(-2px); }

.pub-stat-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  margin: 0 auto .875rem;
}

.pub-stat-number { font-size: 2.5rem; font-weight: 800; line-height: 1; margin-bottom: .25rem; }
.pub-stat-label  { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; opacity: .75; }

/* Trend Bar Chart */
.trend-chart-wrap  { overflow-x: auto; }
.trend-bars        { display: flex; align-items: flex-end; gap: .5rem; height: 140px; padding: .5rem 0; }
.trend-bar-group   { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 36px; }
.trend-bar         { width: 100%; border-radius: 6px 6px 0 0; transition: height .5s ease; min-height: 4px; }
.trend-bar-hadir   { background: var(--em-400); }
.trend-bar-tidak   { background: #fca5a5; }
.trend-label-day   { font-size: .68rem; color: #64748b; text-align: center; white-space: nowrap; }
.trend-label-count { font-size: .72rem; font-weight: 700; color: var(--em-700); }

.trend-legend {
  display: flex;
  gap: 1rem;
  justify-content: flex-end;
  margin-bottom: .5rem;
  font-size: .78rem;
}
.legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }

/* ── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar            { width: 5px; height: 5px; }
::-webkit-scrollbar-track      { background: transparent; }
::-webkit-scrollbar-thumb      { background: var(--em-200); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover{ background: var(--em-400); }
#sidebar::-webkit-scrollbar       { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 991.98px) {
  #sidebar {
    transform: translateX(-100%);
    box-shadow: none;
  }
  #sidebar.open {
    transform: translateX(0);
    box-shadow: 6px 0 30px rgba(0,0,0,.2);
  }
  #main-content           { margin-left: 0; }
  .btn-sidebar-toggle     { display: flex !important; }
  .views-container        { padding: 1rem; }
}

@media (max-width: 575.98px) {
  .topbar          { padding: 0 .875rem; gap: .5rem; }
  .topbar-title    { font-size: .82rem; }
  .live-clock      { font-size: .85rem; }
  .views-container { padding: .75rem; }
  .view-title      { font-size: 1rem; }
  .card-header-emerald { padding: .75rem 1rem; }
  .stat-card-number { font-size: 1.75rem; }
}
</style>
